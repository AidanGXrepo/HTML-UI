<!DOCTYPE html>
<html>
    <head>
        <title>HTML-UI</title>
        <style> 
            body {
                background-color: rgb(45, 115, 196);
            }

            h1 {
                width: 700px;
                margin: 24px auto;
                padding: 14px;
                background: gray;
                color: black;
                text-decoration: none;
                border-radius: 6px;
                font-weight: bold;
                font-size: 30px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }


            h3 {
                display: block;
                width: 800px;
                margin: 0px auto;
                padding: 14px;
                background: lightblue;
                color: black;
                text-decoration: none;
                border-radius: 6px;
                font-weight: bold;
                font-size: 30px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }
            button {
                display: block;
                width: 290px;
                margin: 12px auto;
                padding: 14px;
                background: gray;
                color: black;
                text-decoration: none;
                border-radius: 12px;
                font-weight: bold;
                font-size: 20px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
                cursor: pointer;
            }

            button.downloads {
                display: block;
                width: 290px;
                margin: 12px auto;
                padding: 14px;
                background: lightgreen;
                color: black;
                text-decoration: none;
                border-radius: 12px;
                font-weight: bold;
                font-size: 20px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }

            button:hover {
                transform: scale(1.06);
            }
        </style>
    </head>
    <body>
         <h3>HTML-UI</h3>
         <h1>This is a simple UI i made for html</h1>
         <button onclick="window.location.href='Pages/headings.html'">Headings</button>
         <button onclick="window.location.href='Pages/background.html'">Backgrounds</button>
         <button onclick="window.location.href='Pages/buttons.html'">Buttons</button>
         <button class="downloads" onclick="window.location.href='Pages/Downloads.html'">Downloads</button>
    </body>
