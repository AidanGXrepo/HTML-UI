<!DOCTYPE html>
<html>
    <head>
        <title>Backgrounds</title>
        <style> /* customize here */
            body {
                background-color: rgb(45, 115, 196);
            }

            h3 {
                display: block;
                width: 800px;
                margin: 24px auto;
                padding: 14px;
                background: lightblue;
                color: black;
                text-decoration: none;
                border-radius: 6px;
                font-weight: bold;
                font-size: 30px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }
               button {
                display: block;
                width: 290px;
                margin: 12px auto;
                padding: 14px;
                background: gray;
                color: black;
                text-decoration: none;
                border-radius: 12px;
                font-weight: bold;
                font-size: 20px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }


            button.hover:hover {
                transform: scale(1.06);
            }
        </style>
    </head>
    <body>
         <h3>You can change the background color under style</h3>
         <button class="hover" onclick="window.location.href='../index.html'">Go back to front page</button>
    </body>
