<!DOCTYPE html>
<html>
    <head>
        <title>Downloads</title>
        <style> 
            body {
                background-color: rgb(45, 115, 196);
            }

            h3 {
                display: block;
                width: 800px;
                margin: 24px auto;
                padding: 14px;
                background: lightblue;
                color: black;
                text-decoration: none;
                border-radius: 6px;
                font-weight: bold;
                font-size: 30px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }
            button {
                display: block;
                width: 290px;
                margin: 12px auto;
                padding: 14px;
                background: gray;
                color: black;
                text-decoration: none;
                border-radius: 12px;
                font-weight: bold;
                font-size: 20px;
                transition: 0.2s;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }


            button:hover {
                transform: scale(1.06);
            }
        </style>
    </head>
    <body>
         <h3>Downloads</h3>
         <button onclick="window.location.href='https://raw.githubusercontent.com/AidanGXrepo/HTML-UI/refs/heads/main/Code/headings%20code'">Headings</button>
         <button onclick="window.location.href='https://raw.githubusercontent.com/AidanGXrepo/HTML-UI/refs/heads/main/Code/background%20code'">Backgrounds</button>
         <button onclick="window.location.href='https://raw.githubusercontent.com/AidanGXrepo/HTML-UI/refs/heads/main/Code/Buttons%20code'">Buttons</button>
    </body>
